<!-- REQUIRES jszip.js IN THIS FOLDER TO FUNCTION https://stuk.github.io/jszip/ -->
<!-- REQUIRES FileSaver.js IN THIS FOLDER TO FUNCTION https://github.com/eligrey/FileSaver.js/ -->

<!doctype html>
<head>
    <title>Speedo Digit Generator</title>
</head>

<body>
    <!-- MARK: Body -->
    <h1>Speedo Digit Generator</h1>
    <p class="subheading">Upload a font to generate images for a TF2 speedo VTF</p>

    <div class="form-container">
        <label for="speedo-type-select">Speedo Type</label>
        <select id="speedo-type-select" name="speedo-type-select">
            <option value="frame11">0-9</option>
            <option value="frame111">0-99</option>
            <option value="frame3501">0-3500</option>
        </select>

        <label for="upload-font">Font </label>
        <input type="file" accept=".ttf, .otf" id="upload-font" name="upload-font" />

        <label for="font-size-input">Font Size </label>
        <input type="number" value="64" id="font-size-input" name="font-size-input" />

        <label for="pad-input">Padding Amt </label>
        <input type="number" value="0" id="pad-input" name="pad-input" />

        <div class="resolution-inputs-container">
            <p>VTF Resolution</p>
            <label for="vtf-res-x-input">x</label>
            <input
                type="number"
                value="64"
                step="16"
                min="8"
                id="vtf-res-x-input"
                name="vtf-res-x-input"
            />
            <label for="vtf-res-y-input">y</label>
            <input
                type="number"
                value="64"
                step="16"
                min="8"
                id="vtf-res-y-input"
                name="vtf-res-y-input"
            />
        </div>

        <label for="debug-checkbox">Debug</label>
        <input type="checkbox" id="debug-checkbox" name="debug-checkbox" />

        <button id="preview-btn">Preview</button>
        <button id="download-btn">Download</button>
    </div>

    <style>
        @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap");
        * {
            font-family: "Space Grotesk", sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            margin: 1rem;
            background-color: #181824;
            color: rgb(213, 206, 227);
        }
        input,
        select,
        button {
            padding: 0.2em 0.4em;
            border-radius: 0.2em;
            border: none;
            background-color: #3a2e4c;
            color: rgb(213, 206, 227);
        }
        input:hover,
        select:hover,
        button:hover {
            background-color: #513b71;
            color: rgb(213, 206, 227);
            transition: 0.15s;
        }
        input[type="file"]::file-selector-button {
            border: none;
            padding: 0.2em 0.4em;
            border-radius: 0.2em;
            background-color: #a29bfe;
            transition: 0.15s;
        }

        input[type="file"]::file-selector-button:hover {
            background-color: #8c6dbb;
            color: rgb(213, 206, 227);
            transition: 0.15s;
        }
        h1 {
            margin-bottom: 0.5rem;
        }
        .subheading {
            margin-bottom: 0.25rem;
        }
        .form-container {
            display: grid;
            gap: 4px;
            grid-template-columns: 145px 200px;
            justify-items: start;
            margin-bottom: 1rem;
        }
        .resolution-inputs-container {
            grid-column: 1 / -1;
            display: grid;
            row-gap: 4px;
            column-gap: 2px;
            grid-template-columns: 130px 15px 200px;
            justify-items: start;
        }
        .resolution-inputs-container p {
            grid-column: 1 / 2;
            grid-row: 1 / 3;
        }
        .resolution-inputs-container label {
            grid-column: 2 / 3;
        }
        .resolution-inputs-container input {
            grid-column: 3 / 4;
            width: 50px;
        }
        #pad-input,
        #font-size-input {
            width: 50px;
        }
        #download-btn,
        #preview-btn {
            grid-column: 1 / -1;
            width: 100%;
        }

        canvas {
            background-color: black;
            padding: 2px;
            margin: 2px;
        }
    </style>

    <!-- MARK: Scripts -->
    <script src="./jszip.js"></script>
    <script src="./FileSaver.js"></script>
    <script>
        // MARK: Settings
        let speedoType = "frame11";
        let fontSize = 64;
        let pad = 0;
        let vtfRes = { x: 64, y: 64 };
        let debug = false;

        let maxNumber = 9;
        let maxWidth = 0;

        // MARK: input functions
        function onSpeedoTypeUpdate() {
            speedoType = $speedoType.value;

            switch (speedoType) {
                case "frame11":
                    maxNumber = 9;
                    vtfRes = { x: 64, y: 64 };
                    $vtfResX.value = 64;
                    $vtfResY.value = 64;
                    break;
                case "frame111":
                    maxNumber = 109;
                    vtfRes = { x: 256, y: 64 };
                    $vtfResX.value = 256;
                    $vtfResY.value = 64;
                    break;
                case "frame3501":
                    maxNumber = 3500;
                    vtfRes = { x: 256, y: 64 };
                    $vtfResX.value = 256;
                    $vtfResY.value = 64;
                    break;
                default:
                    maxNumber = 9;
                    break;
            }
        }

        function onFontSizeInput() {
            fontSize = $fontSizeInput.value;
        }

        function onPadInput() {
            pad = parseInt($padInput.value);
        }

        function onVtfResXInput() {
            vtfRes.x = $vtfResX.value;
        }

        function onVtfResYInput() {
            vtfRes.y = $vtfResY.value;
        }

        function updateCanvasSize(res) {
            $canvasRes.innerText = `canvas{width: ${res.x}px; height: ${res.y}px;}`;
        }

        function onDebugUpdate() {
            debug = $debug.checked;
        }

        // MARK: Onload
        window.onload = () => {
            onSpeedoTypeUpdate();
            onFontSizeInput();
            onPadInput();
            onVtfResXInput();
            onVtfResYInput();
            updateCanvasSize(vtfRes);
            onDebugUpdate();
        };

        // MARK: Event listeners
        const $canvasRes = document.createElement("style");
        document.body.appendChild($canvasRes);

        // inputs
        const $speedoType = document.getElementById("speedo-type-select");
        $speedoType.addEventListener("change", () => {
            onSpeedoTypeUpdate();
        });

        const $uploadFontBtn = document.getElementById("upload-font");
        $uploadFontBtn.addEventListener("change", () => {
            uploadFont($uploadFontBtn);
        });

        const $fontSizeInput = document.getElementById("font-size-input");
        $fontSizeInput.addEventListener("change", () => {
            onFontSizeInput();
        });

        const $padInput = document.getElementById("pad-input");
        $padInput.addEventListener("change", () => {
            onPadInput();
        });

        const $vtfResX = document.getElementById("vtf-res-x-input");
        $vtfResX.addEventListener("change", () => {
            onVtfResXInput();
        });

        const $vtfResY = document.getElementById("vtf-res-y-input");
        $vtfResY.addEventListener("change", () => {
            onVtfResYInput();
        });

        const $debug = document.getElementById("debug-checkbox");
        $debug.addEventListener("change", () => {
            onDebugUpdate();
        });

        const $previewBtn = document.getElementById("preview-btn");
        $previewBtn.addEventListener("click", () => {
            updateCanvasSize(vtfRes);
            generateSpeedoFrames(vtfRes);
        });

        const $downloadBtn = document.getElementById("download-btn");
        $downloadBtn.addEventListener("click", () => {
            updateCanvasSize(vtfRes);
            zipImages();
        });

        // MARK: Fonts
        function uploadFont($input) {
            let reader;

            if ($input.files && $input.files[0]) {
                reader = new FileReader();
                reader.readAsDataURL($input.files[0]);
                reader.onload = () => {
                    if (reader.result) {
                        loadFont(reader.result);
                    }
                };
            }
        }

        function loadFont(fontdata) {
            const fontName = "customfont";
            const font = new FontFace(fontName, `url(${fontdata})`);
            // document.fonts.clear();
            document.fonts.add(font);
            font.load().then(() => {
                const css = `.font-${fontName}{font-family: ${fontName}}`;
                const $style = document.createElement("style");
                $style.innerText = css;
                $style.setAttribute("id", "fontName");
                document.body.appendChild($style);
            });
        }

        // MARK: Zip
        async function zipImages() {
            const zipName = `generated-speedo-digits`;

            let zip = new JSZip();

            zip.file("README.md", createReadme());

            let frames = await generateSpeedoFrames(vtfRes);

            for (let i = 0; i < frames.length; i++) {
                zip.file(`${i}.png`, frames[i]);
            }

            zip.file("max-char-width.txt", Math.round(maxWidth).toString());

            downloadZip(zip, zipName);
        }

        function createReadme() {
            return (
                "# mmarc Speedo Digit Generator\n\n" +
                "## Usage:\n" +
                "0. Download and install VTFEdit Reloaded (or a VTF editor of your choice) https://github.com/Sky-rym/VTFEdit-Reloaded\n" +
                "1. Extract this zip\n" +
                "2. Select all images in the zip\n" +
                "3. Drag and drop the images over VTFEdit Reloaded\n" +
                "4. Select the following settings:\n" +
                "  - Color Format: DXT5\n" +
                "  - Alpha Format: DXT5\n" +
                "  - Texture Type Format: Animated Texture\n" +
                "5. Ensure frames correctly align with digits (frame 0 displays 0, frame 1 displays 1, etc.)\n" +
                "6. Save your VTF\n"
            );
        }

        async function generateSpeedoFrames(res) {
            let result;

            for (let i = 0; i < 10; i++) {
                const canvas = document.createElement("canvas");
                canvas.width = res.x;
                canvas.height = res.y;
                const ctx = canvas.getContext("2d");
                ctx.font = `${fontSize}px customfont`;

                maxWidth = ctx.measureText(i.toString()).width;
            }
            maxWidth += pad;

            document.querySelectorAll("canvas").forEach((c) => c.remove());

            switch (speedoType) {
                case "frame11":
                    result = await Promise.all(
                        Array.from({ length: maxNumber + 2 }).map((_, index) => {
                            const canvas = document.createElement("canvas");
                            document.body.appendChild(canvas);
                            canvas.width = res.x;
                            canvas.height = res.y;
                            const ctx = canvas.getContext("2d");
                            ctx.font = `${fontSize}px customfont`;

                            if (index <= maxNumber) {
                                let center = {
                                    x: res.x / 2,
                                    y: res.y * 0.85,
                                };

                                ctx.fillStyle = "white";
                                ctx.textAlign = "center";

                                if (debug) {
                                    ctx.fillRect(center.x - 1, 0, 2, res.y);
                                    ctx.fillRect(center.x - maxWidth / 2, 0, maxWidth, 2);
                                    ctx.fillRect(center.x - maxWidth / 2, res.y - 2, maxWidth, 2);
                                }

                                // render digits
                                ctx.fillText(index.toString(), center.x, center.y);
                            }
                            return convertCanvasToBlobAsync(canvas);
                        }),
                    );
                    break;
                case "frame111":
                    result = await Promise.all(
                        Array.from({ length: maxNumber + 2 }).map((_, index) => {
                            const canvas = document.createElement("canvas");
                            document.body.appendChild(canvas);
                            canvas.width = res.x;
                            canvas.height = res.y;
                            const ctx = canvas.getContext("2d");
                            ctx.font = `${fontSize}px customfont`;

                            if (index <= maxNumber) {
                                let units = index % 10;
                                let tens = Math.floor(index / 10);

                                let center = {
                                    x: res.x / 2,
                                    y: res.y * 0.85,
                                };
                                let alignment = maxWidth / 2;

                                ctx.fillStyle = "white";
                                ctx.textAlign = "center";

                                if (debug) {
                                    ctx.fillRect(center.x - 1, 0, 2, res.y);
                                    ctx.fillRect(center.x - maxWidth, 0, maxWidth, 2);
                                    ctx.fillRect(center.x - maxWidth, res.y - 2, maxWidth, 2);
                                }

                                // render tens
                                ctx.fillText(
                                    index >= 100 ? "0" : tens ? tens.toString() : "",
                                    center.x - alignment,
                                    center.y,
                                );

                                // render units
                                ctx.fillText(units.toString(), center.x + alignment, center.y);
                            }
                            return convertCanvasToBlobAsync(canvas);
                        }),
                    );
                    break;
                case "frame3501":
                    let center = {
                        x: res.x / 2,
                        y: res.y * 0.85,
                    };
                    let digitPos = {
                        // even num of digits
                        e1: center.x - maxWidth * 1.5,
                        e2: center.x - maxWidth * 0.5,
                        e3: center.x + maxWidth * 0.5,
                        e4: center.x + maxWidth * 1.5,
                        // odd num of digits
                        o1: center.x - maxWidth,
                        o2: center.x,
                        o3: center.x + maxWidth,
                    };

                    result = await Promise.all(
                        Array.from({ length: maxNumber + 1 }).map((_, index) => {
                            const canvas = document.createElement("canvas");
                            document.body.appendChild(canvas);
                            canvas.width = res.x;
                            canvas.height = res.y;
                            const ctx = canvas.getContext("2d");
                            ctx.font = `${fontSize}px customfont`;

                            if (index <= maxNumber) {
                                let numDigits =
                                    index < 10
                                        ? 1
                                        : index < 100
                                          ? 2
                                          : index < 1000
                                            ? 3
                                            : index < 10000
                                              ? 4
                                              : 0;

                                let digits = [
                                    index % 10,
                                    Math.floor(index / 10) % 10,
                                    Math.floor(index / 100) % 10,
                                    Math.floor(index / 1000) % 10,
                                ]; // digits in reverse order

                                ctx.fillStyle = "white";
                                ctx.textAlign = "center";

                                switch (numDigits) {
                                    case 1:
                                        ctx.fillText(digits[0].toString(), digitPos.o2, center.y);
                                        break;
                                    case 2:
                                        ctx.fillText(digits[1].toString(), digitPos.e2, center.y);
                                        ctx.fillText(digits[0].toString(), digitPos.e3, center.y);
                                        break;
                                    case 3:
                                        ctx.fillText(digits[2].toString(), digitPos.o1, center.y);
                                        ctx.fillText(digits[1].toString(), digitPos.o2, center.y);
                                        ctx.fillText(digits[0].toString(), digitPos.o3, center.y);
                                        break;
                                    case 4:
                                        ctx.fillText(digits[3].toString(), digitPos.e1, center.y);
                                        ctx.fillText(digits[2].toString(), digitPos.e2, center.y);
                                        ctx.fillText(digits[1].toString(), digitPos.e3, center.y);
                                        ctx.fillText(digits[0].toString(), digitPos.e4, center.y);
                                        break;
                                    default:
                                        break;
                                }

                                if (debug) {
                                    let alignment;
                                    if (numDigits % 2) {
                                        alignment = digitPos.o2 - maxWidth / 2;
                                    } else {
                                        alignment = digitPos.e2 - maxWidth / 2;
                                    }
                                    ctx.fillRect(alignment + maxWidth, 0, 2, res.y);
                                    ctx.fillRect(alignment, 0, maxWidth, 2);
                                    ctx.fillRect(alignment, res.y - 2, maxWidth, 2);
                                }
                            }
                            return convertCanvasToBlobAsync(canvas);
                        }),
                    );
                    break;
                default:
                    break;
            }
            return result;
        }

        async function downloadZip(zip, name) {
            zip.generateAsync({ type: "blob" }).then((content) => {
                saveAs(content, `${name}.zip`);
            });
        }

        async function convertCanvasToBlobAsync(canvas) {
            return new Promise((resolve) => {
                canvas.toBlob((blob) => resolve(blob.arrayBuffer()));
            });
        }
    </script>
</body>
